<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab7.5</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <div class="card">
        <img src="cloud.png" class="cloud" alt="cloud">
        <div class="temp">17</div>

        <div class="nav">
            <div class="btn">&#8592;</div>
            <div class="btn">&#8594;</div>
        </div>
    </div>

    <div class="bottom">
        <div class="day">
            <span class="name">Mon</span>
            <span class="value">17°</span>
        </div>
        <div class="day">
            <span class="name">Tue</span>
            <span class="value">19°</span>
        </div>
        <div class="day">
            <span class="name">Wed</span>
            <span class="value">16°</span>
        </div>
        <div class="day">
            <span class="name">Thu</span>
            <span class="value">18°</span>
        </div>
        <div class="day">
            <span class="name">Fri</span>
            <span class="value">21°</span>
        </div>
    </div>
    
    <div class="bottom-shadow"></div>


</div>

</body>
</html>
